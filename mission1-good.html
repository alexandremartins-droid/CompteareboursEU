<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0" />
<title>Mission 1 · Correct Answers</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
:root{
  --text:#d4e7ff;
  --muted:rgba(212,231,255,.78);
  --title:#fff;
  --cyan:#19dfff;
  --blue:#2aa8ff;
  --gold:#ffd85a;
  --panel1:rgba(9,28,68,.92);
  --panel2:rgba(4,17,47,.96);
}

html,body{
  margin:0;
  padding:0;
  background:transparent!important;
  color:var(--text);
  font-family:'Inter',sans-serif;
  overflow-x:hidden;
}

.page{
  max-width:1600px;
  margin:0 auto;
  padding:52px 48px 76px;
}

.badge{
  display:inline-flex;
  padding:10px 18px;
  border-radius:999px;
  border:1px solid rgba(42,168,255,.7);
  color:var(--blue);
  background:rgba(0,0,0,.18);
  text-transform:uppercase;
  letter-spacing:1px;
  font-size:12px;
  margin-bottom:22px;
  backdrop-filter:blur(10px);
}

h1{
  margin:0 0 14px;
  font-family:'Orbitron',sans-serif;
  font-size:46px;
  font-weight:900;
  color:#fff;
}

.intro{
  font-size:19px;
  line-height:1.6;
  color:var(--muted);
  margin-bottom:30px;
}

.intro strong{color:#fff;}

.tabs{
  display:flex;
  flex-wrap:wrap;
  gap:14px;
  margin:0 0 30px;
}

.tab{
  border:1px solid rgba(25,223,255,.25);
  background:rgba(25,223,255,.08);
  color:#fff;
  border-radius:999px;
  padding:13px 20px;
  font-weight:800;
  cursor:pointer;
  transition:.25s;
}

.tab:hover,
.tab.active{
  background:rgba(25,223,255,.18);
  border-color:rgba(25,223,255,.55);
  box-shadow:0 0 26px rgba(25,223,255,.16);
  transform:translateY(-2px);
}

.mission{
  display:none;
}

.mission.active{
  display:block;
}

.mission-header{
  margin-bottom:24px;
  padding:24px;
  border-radius:28px;
  background:linear-gradient(180deg,var(--panel1),var(--panel2));
  border:1px solid rgba(42,168,255,.38);
  box-shadow:0 22px 60px rgba(0,0,0,.28);
}

.mission-kicker{
  color:var(--cyan);
  font-family:'Orbitron',sans-serif;
  font-size:14px;
  text-transform:uppercase;
  letter-spacing:1px;
  margin-bottom:8px;
}

.mission-title{
  margin:0;
  color:#fff;
  font-size:30px;
  font-weight:900;
}

.sections{
  display:grid;
  gap:22px;
}

.answer-section{
  border-radius:28px;
  background:linear-gradient(180deg,rgba(9,28,68,.88),rgba(4,17,47,.96));
  border:1px solid rgba(42,168,255,.32);
  box-shadow:0 18px 48px rgba(0,0,0,.28);
  overflow:hidden;
}

.section-title{
  padding:18px 22px;
  font-family:'Orbitron',sans-serif;
  color:#fff;
  text-transform:uppercase;
  letter-spacing:1px;
  border-bottom:1px solid rgba(25,223,255,.18);
  background:rgba(25,223,255,.06);
}

.answers-grid{
  display:grid;
  grid-template-columns:repeat(3,minmax(0,1fr));
  gap:16px;
  padding:22px;
}

.answer-card{
  position:relative;
  border-radius:22px;
  padding:18px;
  background:rgba(255,255,255,.045);
  border:1px solid rgba(255,255,255,.08);
  transition:.28s;
}

.answer-card:hover{
  transform:translateY(-5px);
  border-color:rgba(25,223,255,.35);
  box-shadow:0 0 30px rgba(25,223,255,.12);
}

.q-number{
  color:var(--cyan);
  font-weight:900;
  font-size:13px;
  margin-bottom:8px;
}

.question{
  color:#fff;
  font-size:15px;
  line-height:1.45;
  font-weight:700;
  margin-bottom:14px;
}

.answer-row{

  display:block;

}

.letters{

  display:flex;

  gap:8px;

  flex-wrap:wrap;

  margin-bottom:12px;

}

.letter{

  display:inline-flex;

  align-items:center;

  justify-content:center;

  width:34px;

  height:34px;

  border-radius:50%;

  background:rgba(255,216,90,.18);

  border:1px solid rgba(255,216,90,.48);

  color:var(--gold);

  font-weight:900;

  flex:0 0 auto;

}

.answer{

  color:rgba(255,255,255,.92);

  font-size:15px;

  line-height:1.45;

  overflow-wrap:anywhere;

  word-break:normal;

}

.reveal{
  opacity:0;
  transform:translateY(18px);
  transition:.6s ease;
}

.reveal.show{
  opacity:1;
  transform:translateY(0);
}

@media(max-width:1200px){
  .answers-grid{grid-template-columns:repeat(2,1fr);}
}

@media(max-width:760px){
  .page{padding:36px 22px 58px;}
  h1{font-size:34px;}
  .intro{font-size:17px;}
  .answers-grid{grid-template-columns:1fr;}
}
</style>
</head>

<body>
<div class="page">

  <div class="badge reveal">Mission Connected Heroes · Correct Answers</div>

  <h1 class="reveal">Mission 1 · Correct Answers</h1>

  <div class="intro reveal">
    Discover the expected answers for the three Mission 1 challenges.
    Each card includes the original question and the correct answer.
    <br><strong>Review. Learn. Improve your score.</strong>
  </div>

  <div class="tabs reveal">
    <button class="tab active" data-target="drive">Mission 1.1 · Drive Smarter</button>
    <button class="tab" data-target="life">Mission 1.2 · Life Easier</button>
    <button class="tab" data-target="trip">Mission 1.3 · Trip Enjoyable</button>
  </div>

  <section class="mission active" id="drive"></section>
  <section class="mission" id="life"></section>
  <section class="mission" id="trip"></section>

</div>

<script>

    title:"Drive Smarter",
    sections:[
      {title:"Maintenance", answers:[
        ["Q1","Based on which criteria does the vehicle suggest maintenance appointments?","C","Vehicle age and mileage"],
        ["Q2","How frequently does the customer receive vehicle health reports by email?","C","Monthly"],

      ]},
      {title:"Safety", answers:[
        ["Q4","Which channels are used to send notifications in case of attempted theft?","A, B, C, D","Mobile app · Customer web portal · SMS · Email"],
        ["Q5","What action must the customer take to request help in case their vehicle is stolen?","A","Press the “Call” button in the mobile app"],
        ["Q6","What condition must be met for vehicle tracking to be activated in case of theft?","B","A police report confirming the theft"],
        ["Q7","Which parameters can be customized in driving alerts?","A, B, C, D","Speed alerts · Time alerts · Geographical boundaries · Valet mode"],
        ["Q8","What is the main benefit of the Theft Alarm Notification feature for the customer?","B","It sends an alert to the customer in case of suspected theft or safety violation"]
      ]},
      {title:"Assistance", answers:[
        ["Q9","In which situation does the automatic SOS system activate?","B","In case of an impact that triggers an airbag or safety belt"],
        ["Q10","What information is sent to the assistance center during a breakdown call?","B, C, D","Vehicle serial number · Mileage · Mechanical alerts"],
        ["Q11","What is the main function of the assistance button in the vehicle?","D","Connect with the call center to receive help in case of a problem"]
      ]},
      {title:"Features", answers:[
        ["Q12","What action can be taken once your vehicle has been confirmed stolen and you file a police report?","B","Activate the GPS tracking system and perform 24/7 monitoring"],
        ["Q13","Which function allows the customer to book a maintenance service at a dealer workshop?","C","Service Scheduling / Online Booking"],
        ["Q14","Among these features, which one is NOT included in the Vehicle Health Alert service?","D","Entertainment system alerts"],
        ["Q15","Among these features, when is the connected alarm triggered?","A, B","When the vehicle has been moved · When the vehicle is bumped while parked"]
      ]}
    ]
  },

  life:{
    kicker:"Mission 1.2",
    title:"Life Easier",
    sections:[
      {title:"Natural Voice Recognition", answers:[
        ["Q1","What are the main advantages of natural voice recognition?","A, D","Intuitive and user-friendly experience · Avoid using the screen while driving"],
        ["Q2","How can voice command be activated in a Stellantis vehicle?","B, C","By pressing a dedicated button in the vehicle · By saying the specific wake word"],
        ["Q3","Which of the following are recognized by natural voice recognition?","A, C, D","“Give me direction for...” · “Play... Radio station” · “Set the temperature to...”"],
        ["Q4","Which of these functions CANNOT be controlled by natural voice recognition?","D","Opening the windows"]
      ]},
      {title:"Remote Operations", answers:[
        ["Q5","Which features are available through the remote-control service?","A, B, C","Lock/unlock doors · Turn on exterior lights · Activate the horn"],
        ["Q6","Which functions are available regarding cabin temperature via the e-remote commands service?","A, C","Pre-heat or pre-cool the cabin · Activate the automatically programmed temperature"]
      ]},
      {title:"Navigation & Trip", answers:[
        ["Q7","Which function allows you to send your destination from your mobile application to your vehicle's embedded navigation system?","B","Send & Go / Send2Nav"],
        ["Q8","What does the acronym MOTA update mean in the context of navigation?","C","Maps Over-The-Air Update"],
        ["Q9","Which function guides the customer to their final destination, even if they can't get there by car?","B","Last Mile Navigation"],
        ["Q10","What information is available through the Parking Finder service?","A, B, C","Parking locations · Available parking spaces · Parking rates"],
        ["Q11","What is special about the On-Street Parking service compared to Parking Finder?","D","It offers a statistical solution for finding a parking space"]
      ]},
      {title:"Electric Vehicle Features", answers:[
        ["Q12","Which service allows you to automatically limit the charge to 80% of the battery level?","A","e-REMOTE control"],
        ["Q13","What is THE main benefit of embedded EV Routing?","D","Guide the driver throughout their journey, including charging stops, with real-time updates"],
        ["Q14","What does the e-Routes by Free2move Charge application allow?","A, B, C, D","Plan a trip on smartphone · Mirroring mode · Best charging stations · Route recalculation"],
        ["Q15","Which advantage is NOT mentioned for the Free2move Charge service?","D","Eco-driving advice for electric cars"]
      ]},
      {title:"Performance", answers:[
        ["Q16","What data does Eco Score use to improve driving style?","A, B, C","Acceleration · Braking · Vehicle speed"],
        ["Q17","For which types of customers is the e-coaching service particularly useful?","A, C","Drivers of a PHEV Hybrid vehicle · Drivers of an electric vehicle"],
        ["Q18","In which areas can advice be provided by the e-Coaching service?","A, B, C, D","Acceleration/Deceleration · Comfort · Charging · Speed"]
      ]}
    ]
  },

  trip:{
    kicker:"Mission 1.3",
    title:"Trip Enjoyable",
    sections:[
      {title:"Entertainment · Games", answers:[
        ["Q1","When is it most appropriate to use the games built into your vehicle?","B","While waiting at a charging station"],
        ["Q2","How many games are available via the connected service called Games?","C","11"],
        ["Q3","Do the onboard games require a permanent internet connection?","B","No, they work offline"],
        ["Q4","Which of these games are NOT mentioned in the presentation?","B","Tetris"],
        ["Q5","Which customer benefit is NOT mentioned regarding onboard games?","D","Available on smartphone and Brand application"]
      ]},
      {title:"Entertainment · ChatGPT", answers:[
        ["Q6","How many knowledge domains are covered by ChatGPT according to the presentation?","B","At least 50"],
        ["Q7","Which of the following questions can ChatGPT answer during a car trip?","B","Can you explain why the sky is blue in a way a 6-year-old can understand?"],
        ["Q8","What limitation of ChatGPT is mentioned in the warning?","A, C, D","Data may not be objective · Data may lack accuracy · Quality depends on provided information"],
        ["Q9","Which equipment is mandatory in the car to use ChatGPT?","A, C, E","Infotainment system · Connected navigation · Natural voice recognition"],
        ["Q10","Which topics are covered by ChatGPT in the vehicle?","A, B, C","Science/technology/mathematics · Video games/music/cinema · History/geography/visual arts"],
        ["Q11","Which features are available via Brand skill for Alexa for electric vehicles?","A, B, C","Start charging · Check charging status · Schedule charging"],
        ["Q12","Which customer benefit is NOT available via Brand skill for Alexa?","D","Save fuel"],
        ["Q13","Thanks to Alexa vehicle-to-home commands, what can you do without leaving your car?","A","Control your smart home"]
      ]},
      {title:"Entertainment · Wi-Fi", answers:[
        ["Q14","How many devices can be connected simultaneously to the vehicle's Wi-Fi?","C","8"],
        ["Q15","What can you do with the app market?","A","Purchase additional features and services via your vehicle infotainment system"]
      ]}
    ]
  }
};

function renderLetters(value){
  return value.split(",").map(letter => `
    <span class="letter">${letter.trim()}</span>
  `).join("");
}

function renderMission(id, data){
  const root = document.getElementById(id);
  root.innerHTML = `
    <div class="mission-header reveal">
      <div class="mission-kicker">${data.kicker}</div>
      <h2 class="mission-title">${data.title}</h2>
    </div>
    <div class="sections">
      ${data.sections.map(section => `
        <div class="answer-section reveal">
          <div class="section-title">${section.title}</div>
          <div class="answers-grid">
            ${section.answers.map(a => `
              <div class="answer-card">
                <div class="q-number">${a[0]}</div>
                <div class="question">${a[1]}</div>
                <div class="answer-row">
                  <div class="letters">${renderLetters(a[2])}</div>
                  <div class="answer">${a[3]}</div>
                </div>
              </div>
            `).join("")}
          </div>
        </div>
      `).join("")}
    </div>
  `;
}

renderMission("drive", DATA.drive);
renderMission("life", DATA.life);
renderMission("trip", DATA.trip);

document.querySelectorAll(".tab").forEach(tab=>{
  tab.addEventListener("click",()=>{
    document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
    document.querySelectorAll(".mission").forEach(m=>m.classList.remove("active"));
    tab.classList.add("active");
    document.getElementById(tab.dataset.target).classList.add("active");
    sendHeightDelayed();
  });
});

function reveal(){
  document.querySelectorAll(".reveal").forEach((el,i)=>{
    setTimeout(()=>el.classList.add("show"), i*35);
  });
}
reveal();

function sendHeight(){
  parent.postMessage({
    type:"resizeMission1Answers",
    height:document.documentElement.scrollHeight
  },"*");
}
function sendHeightDelayed(){setTimeout(sendHeight,220);}

window.addEventListener("load",()=>{
  sendHeight();
  setInterval(sendHeight,900);
});
window.addEventListener("resize",sendHeight);
</script>

</body>
</html>
